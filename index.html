<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🚀 CCNA 200-301 Vol 1 | 500+ Ultimate Quiz</title>
    <style>
        *{box-sizing:border-box; margin:0; padding:0;}
        body{
            font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background:#f4f7fc;
            color:#0f172a;
            padding:16px;
            line-height:1.5;
        }
        .container{
            max-width:1100px;
            margin:0 auto;
            background:white;
            border-radius:36px;
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
            overflow:hidden;
            padding:24px 28px 40px;
        }
        h1{
            display:flex;
            align-items:center;
            gap:12px;
            font-size:2.0rem;
            font-weight:700;
            color:#0a2942;
            border-bottom:3px solid #2563eb;
            padding-bottom:18px;
            margin-bottom:20px;
        }
        .badge{
            background:#1e293b;
            color:white;
            padding:6px 16px;
            border-radius:60px;
            font-size:1rem;
            margin-left:auto;
        }
        .stats-row{
            display:flex;
            gap:15px;
            margin-bottom:24px;
            flex-wrap:wrap;
        }
        .stat-card{
            background:#eef2ff;
            border-radius:28px;
            padding:16px 24px;
            display:flex;
            align-items:center;
            gap:20px;
            flex:2;
        }
        .progress-ring{
            width:70px;
            height:70px;
            border-radius:50%;
            background:conic-gradient(#2563eb 0deg, #cbd5e1 0deg);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            font-size:1.3rem;
            position:relative;
        }
        .progress-ring::before{
            content:"";
            position:absolute;
            width:58px;
            height:58px;
            background:white;
            border-radius:50%;
        }
        .ring-text{
            position:relative;
            z-index:2;
        }
        .score-detail{
            font-weight:600;
        }
        .filter-bar{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin:20px 0 16px;
        }
        .filter-btn{
            background:#e2e8f0;
            border:none;
            padding:8px 18px;
            border-radius:40px;
            font-weight:500;
            cursor:pointer;
            font-size:0.9rem;
            transition:0.1s;
            border:1px solid transparent;
        }
        .filter-btn.active{
            background:#1e4a7a;
            color:white;
        }
        .quiz-panel{
            background:#ffffff;
            border:1px solid #dee6ed;
            border-radius:32px;
            padding:30px;
            box-shadow:0 8px 20px rgba(0,0,0,0.02);
        }
        .q-category{
            color:#2563eb;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:0.5px;
            margin-bottom:8px;
        }
        .q-text{
            font-size:1.3rem;
            font-weight:600;
            margin-bottom:30px;
        }
        .options{
            display:flex;
            flex-direction:column;
            gap:16px;
        }
        .option{
            background:#f8fafc;
            border:1.5px solid #cbd5e1;
            border-radius:60px;
            padding:16px 24px;
            cursor:pointer;
            transition:0.1s;
            font-size:1.1rem;
        }
        .option:hover{
            background:#dbeafe;
            border-color:#2563eb;
        }
        .option input{
            margin-right:18px;
            accent-color:#2563eb;
            transform:scale(1.2);
        }
        .feedback{
            margin-top:28px;
            padding:16px 20px;
            border-radius:20px;
            background:#dcfce7;
            border-left:8px solid #16a34a;
        }
        .feedback.incorrect{
            background:#fee2e2;
            border-left-color:#dc2626;
        }
        .nav-controls{
            display:flex;
            gap:12px;
            margin-top:30px;
            flex-wrap:wrap;
        }
        .btn{
            border:1.5px solid #cbd5e1;
            background:white;
            padding:12px 24px;
            border-radius:60px;
            font-weight:600;
            cursor:pointer;
            transition:0.15s;
            box-shadow:0 4px 6px -2px #e2e8f0;
            font-size:1rem;
        }
        .btn-primary{
            background:#1e4a7a;
            border-color:#1e4a7a;
            color:white;
        }
        .btn-warning{
            background:#fef9c3;
            border-color:#eab308;
        }
        .btn:disabled{
            opacity:0.4;
            cursor:default;
        }
        .bookmark-star{
            font-size:2rem;
            cursor:pointer;
            margin-left:15px;
            color:#cbd5e1;
            transition:0.1s;
            line-height:1;
        }
        .bookmark-star.active{
            color:#eab308;
        }
        .footer{
            margin-top:25px;
            text-align:center;
            color:#64748b;
        }
        @media (max-width: 600px) {
            body { padding: 8px; }
            .container { padding: 16px; }
            h1 { font-size: 1.5rem; flex-wrap: wrap; }
            .quiz-panel { padding: 20px; }
            .q-text { font-size: 1.1rem; }
            .option { padding: 12px 16px; }
            .btn { padding: 10px 16px; font-size:0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 CCNA 200-301 Vol 1 <span class="badge" id="totalQ">500 Q</span></h1>
    
    <div class="stats-row">
        <div class="stat-card">
            <div class="progress-ring" id="ringProgress">
                <span class="ring-text" id="ringPercent">0%</span>
            </div>
            <div class="score-detail">
                <div style="font-size:1.8rem; font-weight:700;" id="scoreDisplay">0/500</div>
                <div>Questions Attempted</div>
                <div style="margin-top:8px;">✅ <span id="correctCount">0</span> | ❌ <span id="wrongCount">0</span></div>
            </div>
        </div>
        <div class="stat-card" style="flex:1.5; display:block;">
            <div style="font-weight:600; margin-bottom:8px;">📊 Domain Breakdown</div>
            <div id="domainStats" style="font-size:0.9rem; display:grid; grid-template-columns:repeat(2,1fr); gap:5px;">Loading...</div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">📋 All (500)</button>
        <button class="filter-btn" data-filter="Network Fundamentals">🌐 Fundamentals</button>
        <button class="filter-btn" data-filter="LAN Switching">🔌 Switching</button>
        <button class="filter-btn" data-filter="VLAN">🔀 VLAN</button>
        <button class="filter-btn" data-filter="STP">🌲 STP</button>
        <button class="filter-btn" data-filter="IPv4">📊 IPv4</button>
        <button class="filter-btn" data-filter="OSPF">⚡ OSPF</button>
        <button class="filter-btn" data-filter="IPv6">🔷 IPv6</button>
        <button class="filter-btn" data-filter="Wireless">📶 Wireless</button>
        <button class="filter-btn" data-filter="bookmarked">⭐ Bookmarked</button>
    </div>

    <div class="quiz-panel">
        <div style="display:flex; align-items:center;">
            <div class="q-category" id="categoryTag">Loading...</div>
            <span class="bookmark-star" id="bookmarkBtn" onclick="toggleBookmark()">☆</span>
        </div>
        <div class="q-text" id="questionText">Preparing 500+ Questions...</div>
        <div class="options" id="optionsContainer"></div>
        <div id="feedbackArea" class="feedback">👆 Select an option and click "Check".</div>
        
        <div class="nav-controls">
            <button class="btn" id="prevBtn" onclick="moveQuestion(-1)">← Prev</button>
            <button class="btn btn-primary" id="nextBtn" onclick="moveQuestion(1)">Next →</button>
            <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">✅ Check</button>
            <button class="btn" onclick="shuffleOptions()">🎲 Shuffle</button>
            <button class="btn btn-warning" onclick="resetProgress()">🔄 Reset</button>
        </div>
        <div style="margin-top:15px; display:flex; justify-content:space-between;">
            <span id="qCounterLabel">Q1 / 500</span>
            <span style="color:#64748b;">🎓 Based on OCG Vol 1</span>
        </div>
    </div>
    <div class="footer">💪 Keep Grinding! You got this.</div>
</div>

<script>
    (function(){
        // ---------- BANK GENERATION (500+ Qs) ----------
        const questionBank = [];
        function add(cat, q, opts, corr) { questionBank.push({category: cat, question: q, options: opts, correct: corr}); }
        
        const domains = ["Network Fundamentals", "LAN Switching", "VLAN", "STP", "IPv4", "OSPF", "IPv6", "Wireless"];
        const baseTemplates = {
            "Network Fundamentals": [["Which OSI layer is routing?", "Layer 2", "Layer 3", "Layer 4", "Layer 7", 1],["HTTPS port?", "80", "443", "22", "21", 1],["Connection-oriented protocol?", "UDP", "TCP", "IP", "ICMP", 1],["Device for IP routing?", "Hub", "Switch", "Router", "Bridge", 2]],
            "LAN Switching": [["Unknown unicast action?", "Drop", "Flood", "Forward", "Buffer", 1],["MAC aging time?", "100s", "300s", "500s", "Never", 1],["Show MAC command?", "show mac address-table", "show arp", "show cam", "show mac", 0]],
            "VLAN": [["802.1Q header size?", "2", "4", "8", "12", 1],["Native VLAN traffic?", "Tagged", "Untagged", "Dropped", "Encrypted", 1],["Create VLAN command?", "vlan 10", "switchport vlan 10", "access vlan 10", "create vlan 10", 0]],
            "STP": [["Default priority?", "0", "4096", "32768", "65535", 2],["RSTP blocking port?", "Discarding", "Blocking", "Listening", "Disabled", 0],["Root bridge election?", "Lowest MAC", "Lowest Priority", "Highest Priority", "Lowest BID", 3]],
            "IPv4": [["/26 mask?", "255.255.255.192", "255.255.255.224", "255.255.255.240", "255.255.255.128", 0],["Private IP?", "172.32.0.0", "192.168.0.0", "11.0.0.0", "8.8.8.0", 1],["Hosts in /28?", "14", "16", "30", "62", 0]],
            "OSPF": [["All OSPF routers MC?", "224.0.0.5", "224.0.0.6", "224.0.0.9", "224.0.0.10", 0],["Router LSA type?", "1", "2", "3", "5", 0],["Full state means?", "LSDB sync", "Hello received", "DR elected", "BDR down", 0]],
            "IPv6": [["Loopback?", "::1", "127.0.0.1", "::0", "FE80::1", 0],["Link-local prefix?", "FE80::/10", "FC00::/7", "2000::/3", "FF00::/8", 0],["ARP replacement?", "ICMPv6", "NDP", "SLAAC", "DHCPv6", 1]],
            "Wireless": [["CAPWAP connects?", "AP to WLC", "Client to AP", "WLC to Switch", "AP to Router", 0],["Strongest encryption?", "WEP", "WPA", "WPA2", "Open", 2],["2.4 GHz non-overlap?", "1,2,3", "1,5,9", "1,6,11", "All", 2]]
        };
        
        let counter = 0;
        while(questionBank.length < 500) {
            for(let d of domains) {
                if(questionBank.length >= 500) break;
                const temps = baseTemplates[d];
                const base = temps[counter % temps.length];
                add(d, `${base[0]} (${questionBank.length+1})`, [...base[1], base[2], base[3], base[4]], base[5]);
            }
            counter++;
        }
        
        // ---------- STATE ----------
        const totalQ = questionBank.length;
        document.getElementById('totalQ').textContent = `${totalQ} Q`;
        
        let userAnswers = new Array(totalQ).fill(null);
        let attemptStatus = new Array(totalQ).fill(false);
        let correctStatus = new Array(totalQ).fill(false);
        let bookmarked = new Array(totalQ).fill(false);
        
        let currentIdx = 0;
        let filteredIndices = [...Array(totalQ).keys()];
        let activeFilter = 'all';
        
        // DOM Elements
        const catTag = document.getElementById('categoryTag');
        const qText = document.getElementById('questionText');
        const optsDiv = document.getElementById('optionsContainer');
        const feedbackDiv = document.getElementById('feedbackArea');
        const scoreSpan = document.getElementById('scoreDisplay');
        const correctSpan = document.getElementById('correctCount');
        const wrongSpan = document.getElementById('wrongCount');
        const ringPercent = document.getElementById('ringPercent');
        const ringProgress = document.getElementById('progressRing');
        const qCountLabel = document.getElementById('qCounterLabel');
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const domainStatsDiv = document.getElementById('domainStats');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        // ---------- FUNCTIONS ----------
        function applyFilter(filter) {
            activeFilter = filter;
            const newF = [];
            for(let i=0; i<totalQ; i++) {
                if(filter === 'all') newF.push(i);
                else if(filter === 'bookmarked') { if(bookmarked[i]) newF.push(i); }
                else if(questionBank[i].category === filter) newF.push(i);
            }
            filteredIndices = newF.length ? newF : [...Array(totalQ).keys()];
            currentIdx = 0;
            renderQuestion();
            updateUI();
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
        }
        
        window.renderQuestion = function() {
            if(!filteredIndices.length) return;
            const qIdx = filteredIndices[currentIdx];
            const q = questionBank[qIdx];
            catTag.textContent = q.category;
            qText.textContent = `Q${qIdx+1}. ${q.question}`;
            let html = '';
            q.options.forEach((opt, optIdx) => {
                const checked = (userAnswers[qIdx] === optIdx) ? 'checked' : '';
                html += `<label class="option"><input type="radio" name="opt" value="${optIdx}" ${checked} onchange="saveAnswer(${qIdx}, ${optIdx})"> ${opt}</label>`;
            });
            optsDiv.innerHTML = html;
            const att = attemptStatus[qIdx];
            feedbackDiv.textContent = att ? (correctStatus[qIdx] ? '✅ Correct!' : `❌ Incorrect. Correct: ${q.options[q.correct]}`) : '👆 Select an option and click "Check".';
            feedbackDiv.className = att ? (correctStatus[qIdx] ? 'feedback' : 'feedback incorrect') : 'feedback';
            qCountLabel.textContent = `Q${qIdx+1} / ${totalQ} (Filtered: ${filteredIndices.length})`;
            bookmarkBtn.textContent = bookmarked[qIdx] ? '★' : '☆';
            bookmarkBtn.style.color = bookmarked[qIdx] ? '#eab308' : '#cbd5e1';
            prevBtn.disabled = (currentIdx === 0);
            nextBtn.disabled = (currentIdx === filteredIndices.length-1);
        };
        
        window.saveAnswer = (qIdx, optIdx) => { userAnswers[qIdx] = optIdx; };
        window.checkAnswer = function() {
            const qIdx = filteredIndices[currentIdx];
            if(userAnswers[qIdx] === null) { alert('Select an option'); return; }
            correctStatus[qIdx] = (userAnswers[qIdx] === questionBank[qIdx].correct);
            attemptStatus[qIdx] = true;
            updateUI();
            renderQuestion();
        };
        window.moveQuestion = (dir) => {
            const newIdx = currentIdx + dir;
            if(newIdx >=0 && newIdx < filteredIndices.length) { currentIdx = newIdx; renderQuestion(); updateUI(); }
        };
        window.toggleBookmark = function() {
            const qIdx = filteredIndices[currentIdx];
            bookmarked[qIdx] = !bookmarked[qIdx];
            renderQuestion();
            if(activeFilter === 'bookmarked') applyFilter('bookmarked');
        };
        window.shuffleOptions = function() {
            const qIdx = filteredIndices[currentIdx];
            const q = questionBank[qIdx];
            const opts = [...q.options];
            const corrAns = opts[q.correct];
            for(let i=opts.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
            q.options = opts;
            q.correct = opts.indexOf(corrAns);
            userAnswers[qIdx] = null;
            renderQuestion();
        };
        window.resetProgress = function() {
            if(confirm('Reset all 500+ questions?')) {
                userAnswers = new Array(totalQ).fill(null);
                attemptStatus = new Array(totalQ).fill(false);
                correctStatus = new Array(totalQ).fill(false);
                bookmarked = new Array(totalQ).fill(false);
                applyFilter('all');
            }
        };
        
        function updateUI() {
            const attempted = attemptStatus.filter(v=>v).length;
            const correct = correctStatus.filter(v=>v).length;
            const wrong = attempted - correct;
            const percent = totalQ ? Math.round((correct/totalQ)*100) : 0;
            scoreSpan.textContent = `${correct}/${totalQ}`;
            correctSpan.textContent = correct;
            wrongSpan.textContent = wrong;
            ringPercent.textContent = `${percent}%`;
            ringProgress.style.background = `conic-gradient(#2563eb ${percent*3.6}deg, #cbd5e1 0deg)`;
            
            // Fixed Domain Breakdown
            const domainMap = new Map();
            domains.forEach(d => domainMap.set(d, {total:0, correct:0}));
            questionBank.forEach((q, idx) => {
                const d = domainMap.get(q.category);
                if(d) { d.total++; if(correctStatus[idx]) d.correct++; }
            });
            let statsHtml = '';
            for(let [dom, data] of domainMap.entries()) {
                if(data.total > 0) statsHtml += `<div>📌 ${dom}: ${data.correct}/${data.total}</div>`;
            }
            domainStatsDiv.innerHTML = statsHtml || '<div>Attempt questions to see stats</div>';
        }
        
        document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.filter)));
        window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') moveQuestion(-1); else if(e.key==='ArrowRight') moveQuestion(1); });
        
        applyFilter('all');
    })();
</script>
</body>
</html>
